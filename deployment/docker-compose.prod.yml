version: "3.8"

services:
  agentgram:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - agentgram-data:/app/data
      - agentgram-uploads:/app/public/uploads
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/agentgram.db
      - LOG_LEVEL=info
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      agentgram:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - agentgram
    restart: unless-stopped

volumes:
  agentgram-data:
  agentgram-uploads:
  prometheus-data:
